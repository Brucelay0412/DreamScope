<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamScope 夢想宇宙牆</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <header class="hero">
    <div class="hero-badge">Dream Wall</div>
    <h1>夢想宇宙牆</h1>
    <p>
      把你的夢想放進宇宙裡，<br>
      然後一次一次更新它，直到它真的發光。
    </p>

    <div class="nav-actions">
      <a href="index.html" class="link-btn small-btn">回到首頁</a>
    </div>
  </header>

  <!-- 表單欄位已移到下方的 form，避免重複 id -->

  <main class="wall-layout">
    <section class="card">
      <h2>建立我的夢想追蹤卡</h2>

      <form id="wallForm" onsubmit="return false;" autocomplete="off">
        <div class="wall-form-grid">
          <div>
            <label for="nickname">暱稱</label>
            <input type="text" id="nickname" name="nickname" placeholder="例如：大帥哥" autocomplete="new-password">

            <label for="wallDreamName">夢想名稱</label>
            <input type="text" id="wallDreamName" name="wallDreamName" placeholder="例如：入手 YZF-R6"
              autocomplete="new-password">
          </div>

          <div>
            <label for="wallTargetMoney">目標金額</label>
            <input type="number" id="wallTargetMoney" name="wallTargetMoney" placeholder="例如：450000"
              autocomplete="new-password">

            <label for="wallCurrentMoney">目前存款</label>
            <input type="number" id="wallCurrentMoney" name="wallCurrentMoney" placeholder="例如：100000"
              autocomplete="new-password">
          </div>
        </div>

        <label for="message">給未來自己的話</label>
        <input type="text" id="message" name="message" placeholder="例如：慢慢來，但不要停。" autocomplete="new-password">

        <button type="button" onclick="addDreamToWall()">建立夢想卡</button>
      </form>
    </section>

    <section class="card dream-wall-card">
      <h2>正在發光的夢想</h2>
      <p class="section-desc">
        每張卡片都可以更新目前存款，讓進度條慢慢往前跑。
      </p>

      <div id="dreamList"></div>

      <div id="planModal" class="plan-modal">
        <div class="plan-modal-content">
          <button class="modal-close-btn" type="button" onclick="closePlanModal()">✕</button>

          <h2 id="modalTitle">AI 夢想導航紀錄</h2>

          <div id="modalPlanText" class="modal-plan-text">
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 DreamScope AI 夢想宇宙牆</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>

</html>
