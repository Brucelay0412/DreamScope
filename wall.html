<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DreamScope 夢想宇宙牆</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <header class="hero">
    <div class="hero-badge">Dream Wall</div>
    <h1>夢想宇宙牆</h1>
    <p>
      把你的夢想放進宇宙裡，<br>
      然後一次一次更新它，直到它真的發光。
    </p>

    <div class="nav-actions">
      <a href="index.html" class="link-btn small-btn">回到首頁</a>
    </div>

    <div class="auth-box">
      <div id="authLoggedOut">
        <input type="email" id="authEmail" placeholder="輸入 Email / Gmail">
        <input type="password" id="authPassword" placeholder="輸入密碼，至少 6 碼">

        <div class="auth-actions">
          <button onclick="signUpUser()">註冊帳號</button>
          <button onclick="signInUser()">登入</button>
        </div>

        <p class="auth-hint">登入後，你可以把夢想綁定到自己的帳號。</p>
      </div>

      <div id="authLoggedIn" style="display:none;">
        <p class="auth-user-text">
          已登入：<span id="authUserEmail"></span>
        </p>
        <button onclick="signOutUser()">登出</button>
      </div>
    </div>

  </header>

  <main class="wall-layout">
    <section class="card">
      <h2>建立我的夢想追蹤卡</h2>

      <div class="wall-form-grid">
        <div>
          <label>暱稱</label>
          <input type="text" id="nickname" placeholder="例如：大帥哥">

          <label>夢想名稱</label>
          <input type="text" id="wallDreamName" placeholder="例如：入手 YZF-R6">
        </div>

        <div>
          <label>目標金額</label>
          <input type="number" id="wallTargetMoney" placeholder="例如：450000">

          <label>目前存款</label>
          <input type="number" id="wallCurrentMoney" placeholder="例如：100000">
        </div>
      </div>

      <label>給未來自己的話</label>
      <input type="text" id="message" placeholder="例如：慢慢來，但不要停。">

      <button onclick="addDreamToWall()">建立夢想卡</button>
    </section>

    <section class="card dream-wall-card">
      <h2>正在發光的夢想</h2>
      <p class="section-desc">
        每張卡片都可以更新目前存款，讓進度條慢慢往前跑。
      </p>

      <div id="dreamList"></div>

      <div id="planModal" class="plan-modal">
        <div class="plan-modal-content">
          <button class="modal-close-btn" onclick="closePlanModal()">✕</button>

          <h2 id="modalTitle">AI 夢想導航紀錄</h2>

          <div id="modalPlanText" class="modal-plan-text">
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <p>© 2026 DreamScope AI 夢想宇宙牆</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>

</html>
